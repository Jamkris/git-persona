name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag format
        run: |
          if ! [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version tag format (${{ github.ref_name }}). Expected vX.Y.Z"
            exit 1
          fi

      - name: Verify version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version $TAG_VERSION matches tag $TAG_NAME"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:run

      - name: Get last tag and date
        id: get_last_tag
        run: |
          TAG_LIST=$(git tag --list 'v[0-9]*' --sort=-v:refname)
          LAST_TAG=$(echo "$TAG_LIST" | sed -n '2p')

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
            TAG_DATE="1970-01-01T00:00:00Z"
          else
            TAG_DATE=$(git log -1 --format=%aI "$LAST_TAG" || date -Iseconds)
          fi
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "last_tag_date=$TAG_DATE" >> $GITHUB_OUTPUT

      - name: Generate Changelog from merged PRs
        id: changelog
        uses: actions/github-script@v6
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed",
              base: "main",
              per_page: 100
            });

            const since = new Date("${{ steps.get_last_tag.outputs.last_tag_date }}");
            const mergedPRs = prs.filter(pr => pr.merged_at && new Date(pr.merged_at) > since);

            let changelog = "## What's Changed in ${{ github.ref_name }}\n\n";

            // Section 1: Merged PRs
            if (mergedPRs.length > 0) {
              const formatted = [];
              for (const pr of mergedPRs) {
                let body = pr.body?.trim();
                if (!body) {
                  try {
                    const { data: commits } = await github.rest.pulls.listCommits({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: pr.number,
                      per_page: 20
                    });
                    body = commits.map(c => `- ${c.commit.message.split('\n')[0]}`).join('\n');
                  } catch {
                    body = '_No description provided._';
                  }
                }
                formatted.push(`### ${pr.title} (#${pr.number}) by @${pr.user.login}\n\n${body}`);
              }
              changelog += formatted.join("\n\n---\n\n");
            }

            // Section 2: Direct commits not associated with any PR
            const lastTag = "${{ steps.get_last_tag.outputs.last_tag }}";
            const currentTag = "${{ github.ref_name }}";
            let directCommits = [];

            try {
              const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${lastTag}...${currentTag}`,
                per_page: 100
              });

              // Find commits not linked to any merged PR
              const prCommitShas = new Set();
              for (const pr of mergedPRs) {
                try {
                  const { data: commits } = await github.rest.pulls.listCommits({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    per_page: 100
                  });
                  commits.forEach(c => prCommitShas.add(c.sha));
                } catch (e) {
                  core.warning(`Failed to list commits for PR #${pr.number}: ${e.message}`);
                }
              }

              directCommits = comparison.commits.filter(c => {
                if (prCommitShas.has(c.sha)) return false;
                const msg = c.commit.message;
                // Skip merge commits and version bumps
                if (msg.startsWith('Merge ')) return false;
                if (msg.startsWith('chore: bump version')) return false;
                return true;
              });
            } catch (e) {
              // First release: v0.0.0 tag doesn't exist, skip commit comparison
              core.warning(`Could not compare commits (${lastTag}...${currentTag}): ${e.message}`);
            }

            if (directCommits.length > 0) {
              if (mergedPRs.length > 0) changelog += "\n\n---\n\n";
              changelog += "### Other Changes\n\n";
              changelog += directCommits.map(c => `- ${c.commit.message.split('\n')[0]}`).join('\n');
            }

            if (mergedPRs.length === 0 && directCommits.length === 0) {
              changelog += "_No changes since last release._";
            }

            const fs = require('fs');
            fs.writeFileSync('RELEASE_NOTES.md', changelog);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
